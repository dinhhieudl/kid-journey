<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#6c5ce7">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>🌱 Kid Journey</title>
<link rel="stylesheet" href="/css/photo-album.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#faf8f5;--card:#fff;--primary:#6c5ce7;--primary-light:#a29bfe;
  --secondary:#00b894;--accent:#fdcb6e;--danger:#e17055;
  --text:#2d3436;--text2:#636e72;--border:#e8e4df;
  --shadow:0 2px 12px rgba(0,0,0,.06);--radius:14px;
  --sidebar-w:260px;
}
html{font-size:15px;scroll-behavior:smooth}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex}

/* Sidebar */
.sidebar{width:var(--sidebar-w);background:linear-gradient(170deg,#2d1b69 0%,#44318d 50%,#6c5ce7 100%);color:#fff;padding:0;position:fixed;height:100vh;display:flex;flex-direction:column;z-index:100;overflow:hidden}
.sidebar-header{padding:24px 20px 20px;text-align:center;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar-header h1{font-size:1.3rem;font-weight:800;letter-spacing:-.5px}
.sidebar-header p{font-size:.75rem;opacity:.6;margin-top:4px}
.sidebar nav{flex:1;overflow-y:auto;padding:12px 10px}
.sidebar nav a{display:flex;align-items:center;gap:12px;padding:11px 14px;color:rgba(255,255,255,.7);text-decoration:none;border-radius:10px;font-size:.9rem;font-weight:500;transition:all .2s;margin-bottom:2px}
.sidebar nav a:hover{background:rgba(255,255,255,.1);color:#fff}
.sidebar nav a.active{background:rgba(255,255,255,.18);color:#fff;font-weight:600}
.sidebar nav a .icon{font-size:1.15rem;width:24px;text-align:center}
.sidebar-footer{padding:16px;border-top:1px solid rgba(255,255,255,.1);text-align:center;font-size:.7rem;opacity:.4}

/* Main */
.main{margin-left:var(--sidebar-w);flex:1;min-height:100vh;padding:0}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar h2{font-size:1.2rem;font-weight:700;display:flex;align-items:center;gap:10px}
.content{padding:28px 32px}

/* Kid selector */
.kid-selector{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.kid-chip{padding:8px 18px;border-radius:24px;border:2px solid var(--border);background:var(--card);cursor:pointer;font-size:.85rem;font-weight:600;transition:all .2s;display:flex;align-items:center;gap:6px}
.kid-chip:hover{border-color:var(--primary-light)}
.kid-chip.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.kid-chip.add{border-style:dashed;color:var(--text2)}

/* Cards */
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden}
.card-body{padding:20px 24px}

/* Stats grid */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);border:1px solid var(--border);text-align:center}
.stat-card .num{font-size:2rem;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--primary-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-card .label{font-size:.78rem;color:var(--text2);margin-top:4px;font-weight:500}

/* Grid layouts */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}
@media(max-width:900px){.grid-2,.grid-3{grid-template-columns:1fr}}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:10px;border:none;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .15s}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.btn-primary{background:var(--primary);color:#fff}
.btn-secondary{background:var(--secondary);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-ghost{background:transparent;color:var(--text2);border:1.5px solid var(--border)}
.btn-ghost:hover{border-color:var(--primary);color:var(--primary)}
.btn-sm{padding:6px 12px;font-size:.78rem;border-radius:8px}
.btn-icon{width:34px;height:34px;padding:0;display:inline-flex;align-items:center;justify-content:center;border-radius:8px;border:none;background:transparent;cursor:pointer;font-size:1rem;transition:all .15s}
.btn-icon:hover{background:var(--bg)}

/* Forms */
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:.8rem;font-weight:600;color:var(--text2);margin-bottom:6px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
input,textarea,select{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:.9rem;font-family:inherit;background:var(--bg);transition:border-color .2s}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--primary)}
textarea{resize:vertical;min-height:80px}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border-radius:18px;width:94%;max-width:520px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-header{padding:20px 24px 0;display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:1.1rem;font-weight:700}
.modal-body{padding:20px 24px 24px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;padding:0 24px 20px}

/* Tabs */
.tabs{display:flex;gap:4px;background:var(--bg);border-radius:10px;padding:4px;margin-bottom:20px}
.tab{flex:1;padding:8px;text-align:center;border-radius:8px;font-size:.82rem;font-weight:600;cursor:pointer;color:var(--text2);transition:all .2s}
.tab.active{background:var(--card);color:var(--primary);box-shadow:0 1px 4px rgba(0,0,0,.08)}

/* Diary entry */
.diary-entry{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:14px;transition:all .2s}
.diary-entry:hover{box-shadow:0 4px 20px rgba(0,0,0,.08)}
.diary-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.diary-date{font-size:.78rem;color:var(--text2);font-weight:500}
.diary-mood{font-size:1.4rem}
.diary-title{font-weight:700;font-size:.95rem}
.diary-body{font-size:.9rem;line-height:1.7;color:var(--text2);white-space:pre-wrap}
.diary-tags{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.tag{background:var(--bg);color:var(--primary);padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:600}
.diary-actions{display:flex;gap:4px;margin-left:auto}

/* Plan kanban */
.kanban{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
@media(max-width:900px){.kanban{grid-template-columns:1fr}}
.kanban-col{background:var(--bg);border-radius:var(--radius);padding:16px;min-height:200px}
.kanban-col h4{font-size:.85rem;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.plan-card{background:var(--card);border-radius:10px;padding:14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.05);border:1px solid var(--border);cursor:pointer;transition:all .15s}
.plan-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.08)}
.plan-card h5{font-size:.88rem;font-weight:600;margin-bottom:4px}
.plan-card p{font-size:.78rem;color:var(--text2);line-height:1.5}
.plan-meta{display:flex;gap:8px;margin-top:8px;align-items:center}
.priority{font-size:.68rem;font-weight:700;padding:2px 8px;border-radius:6px;text-transform:uppercase}
.priority-high{background:#ffeaea;color:#e17055}
.priority-medium{background:#fff3e0;color:#e17055}
.priority-low{background:#e8f8f5;color:#00b894}

/* Timeline */
.timeline{position:relative;padding-left:28px}
.timeline::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:2px;background:var(--border)}
.timeline-item{position:relative;margin-bottom:20px}
.timeline-dot{position:absolute;left:-24px;top:4px;width:16px;height:16px;border-radius:50%;background:var(--primary);border:3px solid var(--bg)}
.timeline-item .card{padding:16px 20px}
.timeline-item .date{font-size:.75rem;color:var(--text2);font-weight:500}

/* Growth chart */
.chart-container{position:relative;height:220px;margin:16px 0}
.chart-bar{position:absolute;bottom:30px;width:24px;border-radius:6px 6px 0 0;transition:height .4s}
.chart-label{position:absolute;bottom:0;font-size:.65rem;color:var(--text2);transform:translateX(-50%)}
.chart-value{position:absolute;font-size:.65rem;color:var(--primary);font-weight:600;transform:translateX(-50%)}

/* Photo grid — now handled by photo-album.css (masonry layout) */
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.photo-card{border-radius:12px;overflow:hidden;box-shadow:var(--shadow);border:1px solid var(--border);cursor:pointer;transition:transform .2s;position:relative}
.photo-card:hover{transform:scale(1.03)}
.photo-card img{width:100%;height:140px;object-fit:cover}
.photo-card .caption{padding:8px 10px;font-size:.75rem;color:var(--text2);background:var(--card)}

/* Profile card */
.profile-hero{background:linear-gradient(135deg,var(--primary) 0%,#a29bfe 100%);border-radius:var(--radius);padding:32px;color:#fff;text-align:center;margin-bottom:20px}
.profile-avatar{width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.2);margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:2.2rem;border:3px solid rgba(255,255,255,.3)}
.profile-name{font-size:1.4rem;font-weight:800}
.profile-sub{opacity:.8;font-size:.85rem;margin-top:4px}
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.info-item{background:var(--bg);border-radius:10px;padding:14px}
.info-item .label{font-size:.72rem;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.info-item .value{font-size:.95rem;font-weight:600;margin-top:4px}

/* Empty state */
.empty{text-align:center;padding:48px 20px;color:var(--text2)}
.empty .icon{font-size:3rem;margin-bottom:12px}
.empty p{font-size:.9rem;margin-bottom:16px}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;padding:12px 20px;border-radius:12px;font-size:.85rem;z-index:300;opacity:0;transform:translateY(20px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}

/* Mood picker */
.mood-picker{display:flex;gap:6px;flex-wrap:wrap}
.mood-btn{font-size:1.4rem;padding:6px 8px;border-radius:8px;border:2px solid transparent;cursor:pointer;background:transparent;transition:all .15s}
.mood-btn:hover,.mood-btn.selected{border-color:var(--primary);background:rgba(108,92,231,.08)}

/* Scrollbar */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ===== MOBILE-FIRST REDESIGN ===== */

/* Touch targets minimum 44px */
@media(hover:none){
  .btn{min-height:44px;padding:10px 20px}
  .btn-icon{width:44px;height:44px}
  .kid-chip{min-height:44px;padding:10px 18px}
  .mood-btn{min-width:44px;min-height:44px}
  .sidebar nav a{min-height:44px}
}

/* Mobile: sidebar as overlay */
.menu-toggle{display:none;position:fixed;top:12px;left:12px;z-index:150;width:42px;height:42px;border-radius:12px;background:var(--primary);color:#fff;border:none;font-size:1.2rem;cursor:pointer;box-shadow:0 2px 12px rgba(108,92,231,.3)}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99}

/* Mobile: bottom nav */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);z-index:100;padding:6px 4px env(safe-area-inset-bottom,8px);box-shadow:0 -2px 12px rgba(0,0,0,.06)}
.bottom-nav-inner{display:flex;justify-content:space-around;align-items:center}
.bottom-nav a{display:flex;flex-direction:column;align-items:center;gap:2px;text-decoration:none;color:var(--text2);font-size:.62rem;font-weight:600;padding:4px 2px;border-radius:10px;transition:all .2s;min-width:44px}
.bottom-nav a .bicon{font-size:1.2rem;line-height:1}
.bottom-nav a.active{color:var(--primary)}

@media(max-width:768px){
  :root{--sidebar-w:280px}
  html{font-size:14px}

  /* Sidebar overlay */
  .sidebar{transform:translateX(-100%);transition:transform .3s cubic-bezier(.4,0,.2,1);width:var(--sidebar-w)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.show{display:block}
  .menu-toggle{display:flex;align-items:center;justify-content:center}
  .bottom-nav{display:block}

  /* Main area */
  .main{margin-left:0;padding-bottom:72px}
  .topbar{padding:12px 16px;padding-left:56px;gap:8px;flex-wrap:wrap}
  .topbar h2{font-size:1rem}
  .content{padding:14px 12px}

  /* Kid selector horizontal scroll */
  .kid-selector{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;gap:6px;padding:2px;scrollbar-width:none}
  .kid-selector::-webkit-scrollbar{display:none}
  .kid-chip{white-space:nowrap;flex-shrink:0;font-size:.8rem;padding:7px 14px}

  /* Stats: 2 cols */
  .stats{grid-template-columns:repeat(2,1fr);gap:10px}
  .stat-card{padding:14px 12px}
  .stat-card .num{font-size:1.5rem}

  /* Grids: single col */
  .grid-2,.grid-3{grid-template-columns:1fr;gap:14px}

  /* Cards */
  .card-body{padding:16px 14px}

  /* Diary */
  .diary-entry{padding:14px}
  .diary-header{flex-wrap:wrap;gap:6px}
  .diary-mood{font-size:1.2rem}
  .diary-title{font-size:.88rem}
  .diary-body{font-size:.85rem}

  /* Kanban: horizontal scroll */
  .kanban{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;gap:12px;padding-bottom:8px;scrollbar-width:none}
  .kanban::-webkit-scrollbar{display:none}
  .kanban-col{min-width:280px;flex-shrink:0}

  /* Timeline */
  .timeline{padding-left:24px}

  /* Photo grid — responsive handled by photo-album.css */
  .photo-grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .photo-card img{height:120px}

  /* Modal: full screen on mobile */
  .modal-overlay{align-items:flex-end}
  .modal{width:100%;max-width:none;max-height:90vh;border-radius:18px 18px 0 0;animation:slideUp .3s ease}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .modal-header{padding:16px 16px 0}
  .modal-body{padding:16px}
  .modal-actions{padding:0 16px 16px}
  .modal::before{content:'';display:block;width:36px;height:4px;background:var(--border);border-radius:2px;margin:8px auto 0}

  /* Form rows stack */
  .form-row{grid-template-columns:1fr;gap:10px}
  input,textarea,select{font-size:16px;padding:12px 14px}

  /* Profile */
  .profile-hero{padding:24px 16px}
  .profile-avatar{width:64px;height:64px;font-size:1.8rem}
  .profile-name{font-size:1.2rem}
  .info-grid{grid-template-columns:1fr 1fr;gap:8px}
  .info-item{padding:10px 12px}

  /* Montessori activity cards */
  .montessori-act{flex-direction:column;gap:6px}

  /* Growth chart */
  .chart-container{height:180px}
  .chart-bar{width:18px}

  /* Toast: bottom center */
  .toast{left:50%;right:auto;transform:translateX(-50%) translateY(20px);bottom:80px}
  .toast.show{transform:translateX(-50%) translateY(0)}

  /* Buttons */
  .btn{font-size:.82rem;padding:9px 16px}
  .btn-sm{padding:7px 12px;font-size:.75rem}
}

/* Small phones */
@media(max-width:380px){
  .stats{grid-template-columns:1fr 1fr;gap:8px}
  .stat-card .num{font-size:1.3rem}
  .stat-card .label{font-size:.7rem}
  .photo-grid{grid-template-columns:repeat(2,1fr)}
  .info-grid{grid-template-columns:1fr}
}

/* Landscape phone */
@media(max-height:500px) and (orientation:landscape){
  .modal{max-height:95vh}
  .modal::before{display:none}
}

/* Safe area for notch devices */
@supports(padding:max(0px)){
  .bottom-nav{padding-bottom:max(8px,env(safe-area-inset-bottom))}
  .topbar{padding-top:max(12px,env(safe-area-inset-top))}
}

/* Loading spinner overlay */
.loading-overlay{position:fixed;inset:0;background:rgba(250,248,245,.7);z-index:250;display:none;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.loading-overlay.show{display:flex}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-overlay .msg{margin-top:12px;font-size:.85rem;color:var(--text2);font-weight:500}
</style>
</head>
<body>

<button class="menu-toggle" onclick="toggleSidebar()">☰</button>
<div class="sidebar-overlay" onclick="toggleSidebar()"></div>

<aside class="sidebar">
  <div class="sidebar-header">
    <h1>🌱 Kid Journey</h1>
    <p>Nhật ký cho bé yêu</p>
  </div>
  <nav>
    <a href="#" data-page="dashboard" class="active"><span class="icon">📊</span> Tổng quan</a>
    <a href="#" data-page="diary"><span class="icon">📝</span> Nhật ký</a>
    <a href="#" data-page="plans"><span class="icon">🎯</span> Kế hoạch</a>
    <a href="#" data-page="milestones"><span class="icon">⭐</span> Cột mốc</a>
    <a href="#" data-page="growth"><span class="icon">📏</span> Phát triển</a>
    <a href="#" data-page="montessori"><span class="icon">🧬</span> Montessori</a>
    <a href="#" data-page="photos"><span class="icon">📷</span> Album ảnh</a>
    <a href="#" data-page="profile"><span class="icon">👤</span> Hồ sơ bé</a>
    <a href="#" data-page="settings"><span class="icon">⚙️</span> Sao lưu & Khôi phục</a>
  </nav>
  <div class="sidebar-footer">Kid Journey v1.0 · Made with ❤️</div>
</aside>

<main class="main">
  <div class="topbar">
    <h2 id="pageTitle">📊 Tổng quan</h2>
    <div class="kid-selector" id="kidSelector"></div>
  </div>
  <div class="content" id="content"></div>
</main>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle"></h3>
      <button class="btn-icon" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-actions" id="modalActions"></div>
  </div>
</div>

<div class="loading-overlay" id="loadingOverlay"><div style="text-align:center"><div class="spinner"></div><div class="msg" id="loadingMsg">Đang tải...</div></div></div>
<div class="toast" id="toast"></div>

<!-- Bottom Nav (mobile) -->
<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <a href="#" data-page="dashboard" class="active" onclick="navTo('dashboard')"><span class="bicon">📊</span>Tổng quan</a>
    <a href="#" data-page="diary" onclick="navTo('diary')"><span class="bicon">📝</span>Nhật ký</a>
    <a href="#" data-page="plans" onclick="navTo('plans')"><span class="bicon">🎯</span>Kế hoạch</a>
    <a href="#" data-page="montessori" onclick="navTo('montessori')"><span class="bicon">🧬</span>Montessori</a>
    <a href="#" data-page="profile" onclick="navTo('profile')"><span class="bicon">👤</span>Hồ sơ</a>
  </div>
</nav>

<script>
const MOODS = [
  {v:'happy',e:'😊',l:'Vui vẻ'},{v:'excited',e:'🤩',l:'Phấn khích'},
  {v:'love',e:'🥰',l:'Yêu thương'},{v:'calm',e:'😌',l:'Bình yên'},
  {v:'sad',e:'😢',l:'Buồn'},{v:'sick',e:'🤒',l:'Ốm'},
  {v:'angry',e:'😠',l:'Giận'},{v:'sleepy',e:'😴',l:'Buồn ngủ'}
];
const CATEGORIES = [
  {v:'education',e:'📚',l:'Giáo dục'},{v:'health',e:'🏥',l:'Sức khỏe'},
  {v:'sport',e:'⚽',l:'Thể thao'},{v:'art',e:'🎨',l:'Nghệ thuật'},
  {v:'music',e:'🎵',l:'Âm nhạc'},{v:'travel',e:'✈️',l:'Du lịch'},
  {v:'social',e:'👫',l:'Xã hội'},{v:'life',e:'🏡',l:'Đời sống'},
  {v:'skill',e:'💡',l:'Kỹ năng'},{v:'other',e:'📌',l:'Khác'}
];
const PLAN_STATUSES = [
  {v:'planned',l:'📋 Dự kiến',color:'#6c5ce7'},

let state = { kids:[], selectedKid:null, page:'dashboard', token:null, user:null };

// API — auto-attach JWT
async function api(path, opts={}) {
  const o = { headers:{'Content-Type':'application/json'}, ...opts };
  if (state.token) o.headers['Authorization'] = 'Bearer ' + state.token;
  if (o.body && typeof o.body === 'object') o.body = JSON.stringify(o.body);
  const r = await fetch('/api'+path, o);
  if (r.status === 401 && !path.startsWith('/auth')) { logout(); return null; }
  return r.json();
}

// Upload helper (multipart, with JWT)
async function apiUpload(path, formData) {
  const headers = {};
  if (state.token) headers['Authorization'] = 'Bearer ' + state.token;
  const r = await fetch('/api'+path, { method:'POST', headers, body:formData });
  return r.json();
}

// Loading spinner
function showLoading(msg) {
  document.getElementById('loadingMsg').textContent = msg || 'Đang tải...';
  document.getElementById('loadingOverlay').classList.add('show');
}
function hideLoading() {
  document.getElementById('loadingOverlay').classList.remove('show');
}

// Register Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}

// Toast
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

// Modal
function openModal(title, bodyHtml, actions) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = bodyHtml;
  document.getElementById('modalActions').innerHTML = actions || '';
  document.getElementById('modal').classList.add('show');
}
function closeModal() { document.getElementById('modal').classList.remove('show'); }

// Navigation
function toggleSidebar() {
  document.querySelector('.sidebar').classList.toggle('open');
  document.querySelector('.sidebar-overlay').classList.toggle('show');
}

function navTo(page) {
  state.page = page;
  // Update sidebar active
  document.querySelectorAll('.sidebar nav a').forEach(x => {
    x.classList.toggle('active', x.dataset.page === page);
  });
  // Update bottom nav active
  document.querySelectorAll('.bottom-nav a').forEach(x => {
    x.classList.toggle('active', x.dataset.page === page);
  });
  render();
  document.querySelector('.sidebar').classList.remove('open');
  document.querySelector('.sidebar-overlay').classList.remove('show');
  window.scrollTo({top: 0, behavior: 'smooth'});
}

document.querySelectorAll('.sidebar nav a').forEach(a => {
  a.addEventListener('click', e => { e.preventDefault(); navTo(a.dataset.page); });
});

// Swipe to open/close sidebar
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, {passive:true});
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const sidebar = document.querySelector('.sidebar');
  if (touchStartX < 30 && dx > 60) { sidebar.classList.add('open'); document.querySelector('.sidebar-overlay').classList.add('show'); }
  if (sidebar.classList.contains('open') && dx < -60) { toggleSidebar(); }
}, {passive:true});

function showDiaryForm(id) {
  const edit = id ? true : false;
  const moodsHtml = MOODS.map(m=>`<button type="button" class="mood-btn ${m.v==='happy'?'selected':''}" data-mood="${m.v}" onclick="pickMood(this)">${m.e}</button>`).join('');
  const catsHtml = CATEGORIES.map(c=>`<option value="${c.v}">${c.e} ${c.l}</option>`).join('');
  openModal(edit ? 'Sửa nhật ký' : 'Viết nhật ký mới', `
    <div class="form-group"><label>Ngày</label><input type="date" id="f-date" value="${new Date().toISOString().slice(0,10)}"></div>
    <div class="form-group"><label>Tiêu đề</label><input id="f-title" placeholder="Hôm nay con..."></div>
    <div class="form-group"><label>Nội dung *</label><textarea id="f-content" rows="5" placeholder="Viết về ngày hôm nay của bé..."></textarea></div>
    <div class="form-group"><label>Tâm trạng</label><div class="mood-picker">${moodsHtml}</div></div>
    <div class="form-group"><label>Tags (phân cách bằng dấu phẩy)</label><input id="f-tags" placeholder="đi chơi, học bài, ăn ngon..."></div>
  `, `<button class="btn btn-ghost" onclick="closeModal()">Hủy</button><button class="btn btn-primary" onclick="saveDiary(${id||'null'})">💾 Lưu</button>`);
  if (edit) {
    api(`/kids/${state.selectedKid}/diary`).then(entries=>{
      const d = entries.find(e=>e.id===id);
      if(d){
        document.getElementById('f-date').value=d.date;
        document.getElementById('f-title').value=d.title||'';
        document.getElementById('f-content').value=d.content;
        document.getElementById('f-tags').value=d.tags||'';
        document.querySelectorAll('.mood-btn').forEach(b=>b.classList.remove('selected'));
        const mb=document.querySelector(`.mood-btn[data-mood="${d.mood}"]`);
        if(mb)mb.classList.add('selected');
      }
    });
  }
}

function pickMood(btn) {
  document.querySelectorAll('.mood-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
}

async function saveDiary(id) {
  const mood = document.querySelector('.mood-btn.selected')?.dataset.mood || 'happy';
  const data = {
    date: document.getElementById('f-date').value,
    title: document.getElementById('f-title').value.trim(),
    content: document.getElementById('f-content').value.trim(),
    mood, tags: document.getElementById('f-tags').value.trim()
  };
  if (!data.content) return toast('⚠️ Nhập nội dung nhé!');
  if (id) {
    await api(`/diary/${id}`, {method:'PUT', body:data});
    toast('✅ Đã cập nhật nhật ký!');
  } else {
    await api(`/kids/${state.selectedKid}/diary`, {method:'POST', body:data});
    toast('📝 Đã thêm nhật ký mới!');
  }
  closeModal(); render();
}

async function deleteDiary(id) {
  if (!confirm('Xóa nhật ký này?')) return;
  await api(`/diary/${id}`, {method:'DELETE'});
  toast('🗑 Đã xóa'); render();
}

            <div style="font-size:1.5rem;margin-bottom:4px">⚖️</div>
            <div style="font-size:.75rem;color:var(--text2)">Cân nặng</div>
            <div style="font-size:1.3rem;font-weight:800;margin:4px 0">${latest.weight} kg</div>
            <div style="font-size:.8rem;font-weight:600;color:${who.weight.evaluation.color}">${who.weight.evaluation.icon} ${who.weight.evaluation.label}</div>
            <div style="font-size:.72rem;color:var(--text2);margin-top:4px">Z: ${who.weight.zScore} · P${who.weight.percentile}</div>

        </div>` : ''}

  } else if (!whoAvailable && data.message) {

  // Draw WHO charts after DOM update
  if (whoAvailable && whoCurves) {

      drawWHOChart('weightChart', data, whoCurves.weight, 'weight', 'kg', kid.birthday, kid.gender);

    });
  }

// ============ PHOTOS (Enhanced Album System) ============

// Photo album state
let photoState = {
  view: 'timeline',       // 'timeline' | 'albums' | 'tags'
  selectionMode: false,
  selectedIds: new Set(),
  currentLightboxIndex: -1,
  lightboxPhotos: [],
  albums: [],
  tags: [],
  photos: [],
  uploadProgress: 0,
  uploadFiles: [],
};

// ---- Main Render ----
async function renderPhotos() {
  if (!state.selectedKid) return renderNoKid();
  const c = document.getElementById('content');

  // Show loading
  c.innerHTML = '<div class="empty"><div class="spinner"></div><p>Đang tải ảnh...</p></div>';

  // Load data in parallel
  const [photos, stats, albums, tags] = await Promise.all([
    api(`/kids/${state.selectedKid}/photos`),
    api(`/kids/${state.selectedKid}/photos/stats`).catch(() => null),
    api(`/kids/${state.selectedKid}/photos/albums`).catch(() => []),
    api(`/kids/${state.selectedKid}/photos/tags`).catch(() => []),
  ]);

  photoState.photos = photos || [];
  photoState.albums = albums || [];
  photoState.tags = tags || [];
  photoState.selectionMode = false;
  photoState.selectedIds.clear();

  c.innerHTML = `
    <!-- Stats Bar -->
    ${stats ? `<div class="photo-stats-bar">
      <div class="stat-item">📷 <strong>${stats.images || 0}</strong> ảnh</div>
      <div class="stat-item">🎬 <strong>${stats.videos || 0}</strong> video</div>
      <div class="stat-item">📁 <strong>${stats.albumCount || 0}</strong> album</div>
      <div class="stat-item">🏷️ <strong>${stats.tagCount || 0}</strong> thẻ</div>
      <div class="stat-item">💾 <strong>${formatFileSize(stats.totalSize || 0)}</strong></div>
    </div>` : ''}

    <!-- Header -->
    <div class="photo-header">
      <div class="photo-header-left">
        <div class="photo-tabs">
          <button class="photo-tab ${photoState.view==='timeline'?'active':''}" onclick="switchPhotoView('timeline')">📅 Thời gian</button>
          <button class="photo-tab ${photoState.view==='albums'?'active':''}" onclick="switchPhotoView('albums')">📁 Album</button>
          <button class="photo-tab ${photoState.view==='tags'?'active':''}" onclick="switchPhotoView('tags')">🏷️ Thẻ</button>
        </div>
      </div>
      <div class="photo-header-right">
        <button class="btn btn-ghost btn-sm" onclick="toggleSelectionMode()">☑️ Chọn</button>
        <button class="btn btn-primary" onclick="showEnhancedUpload()">📷 Tải ảnh lên</button>
      </div>
    </div>

    <!-- Content -->
    <div id="photoViewContent"></div>
  `;

  renderPhotoViewContent();
}

function renderPhotoViewContent() {
  const container = document.getElementById('photoViewContent');
  if (!container) return;

  if (photoState.view === 'timeline') {
    renderPhotoTimeline(container);
  } else if (photoState.view === 'albums') {
    renderPhotoAlbums(container);
  } else if (photoState.view === 'tags') {
    renderPhotoTags(container);
  }
}

function switchPhotoView(view) {
  photoState.view = view;
  document.querySelectorAll('.photo-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.photo-tab[onclick="switchPhotoView('${view}')"]`)?.classList.add('active');
  renderPhotoViewContent();
}

// ---- Timeline View (Masonry + Date Groups) ----
function renderPhotoTimeline(container) {
  const photos = photoState.photos;
  if (!photos.length) {
    container.innerHTML = '<div class="empty"><div class="icon">📷</div><p>Chưa có ảnh nào</p><button class="btn btn-primary" onclick="showEnhancedUpload()">📷 Tải ảnh đầu tiên</button></div>';
    return;
  }

  // Group by date
  const groups = {};
  photos.forEach(p => {
    const d = p.date || 'unknown';
    if (!groups[d]) groups[d] = [];
    groups[d].push(p);
  });

  const sortedDates = Object.keys(groups).sort((a, b) => b.localeCompare(a));

  container.innerHTML = sortedDates.map(date => {
    const datePhotos = groups[date];
    const dateLabel = formatDateLabel(date);
    return `
      <div class="photo-date-group">
        <div class="photo-date-header">
          <span class="date-text">📅 ${dateLabel}</span>
          <span class="date-count">${datePhotos.length} ảnh</span>
          <span class="date-relative">${relativeDate(date)}</span>
        </div>
        <div class="masonry-grid">
          ${datePhotos.map((p, i) => renderMasonryItem(p, i)).join('')}
        </div>
      </div>
    `;
  }).join('');

  // Build flat list for lightbox
  photoState.lightboxPhotos = photos;
}

function renderMasonryItem(photo, index) {
  const isVideo = photo.file_type === 'video';
  const thumbSrc = photo.thumbnail_path ? `/uploads/${photo.thumbnail_path}` : `/uploads/${photo.filename}`;
  const tags = photo.tags || [];
  const isSelected = photoState.selectedIds.has(photo.id);

  return `
    <div class="masonry-item ${isSelected ? 'selected' : ''}" data-id="${photo.id}" data-index="${index}"
         onclick="onPhotoClick(event, ${photo.id})" ondblclick="openLightbox(${photo.id})">
      <div class="select-check ${isSelected ? 'checked' : ''}" onclick="event.stopPropagation(); togglePhotoSelect(${photo.id})">
        ${isSelected ? '✓' : ''}
      </div>
      ${tags.length ? `<div class="photo-tags">${tags.map(t =>
        `<span class="photo-tag-chip" style="background:${t.color}">${t.name}</span>`
      ).join('')}</div>` : ''}
      ${isVideo ? `
        <div class="video-badge">🎬 ${formatDuration(photo.duration)}</div>
        <video src="/uploads/${photo.filename}" muted preload="metadata" style="aspect-ratio:${photo.width && photo.height ? photo.width+'/'+photo.height : '4/3'}"></video>
      ` : `
        <img src="${thumbSrc}" alt="${esc(photo.caption||'')}" loading="lazy"
             style="aspect-ratio:${photo.width && photo.height ? photo.width+'/'+photo.height : 'auto'}"
             onerror="this.src='/uploads/${photo.filename}'">
      `}
      <div class="item-overlay">
        ${photo.caption ? `<div class="caption">${esc(photo.caption)}</div>` : ''}
        <div class="meta">${photo.exif_date || photo.date || ''} ${photo.camera_model ? '· '+esc(photo.camera_model) : ''} ${photo.file_size ? '· '+formatFileSize(photo.file_size) : ''}</div>
      </div>
    </div>
  `;
}

// ---- Albums View ----
function renderPhotoAlbums(container) {
  const albums = photoState.albums;
  container.innerHTML = `
    <div class="album-grid">
      <div class="album-card add-album" onclick="showCreateAlbum()">
        <div class="album-cover">➕</div>
        <div class="album-info"><h4>Tạo album mới</h4><p>Nhóm ảnh theo chủ đề</p></div>

        <div class="album-card" onclick="openAlbum(${a.id})">
          <div class="album-cover" style="${a.cover_thumbnail || a.cover_filename ? '' : `background:${a.color || '#6366f1'}`}">

            <span class="album-count">${a.photo_count || 0} ảnh</span>

            ${a.description ? `<p>${esc(a.description)}</p>` : ''}

      `).join('')}
    </div>
  `;
}

function toggleSelectionMode() {
  photoState.selectionMode = !photoState.selectionMode;
  photoState.selectedIds.clear();

  const content = document.getElementById('content');
  if (photoState.selectionMode) {
    content.classList.add('selection-mode');
    document.querySelector('.bulk-toolbar')?.classList.add('show');
    createBulkToolbar();
  } else {
    content.classList.remove('selection-mode');
    document.querySelector('.bulk-toolbar')?.classList.remove('show');
  }

  // Update checkboxes
  document.querySelectorAll('.masonry-item').forEach(item => {
    const id = Number(item.dataset.id);
    const check = item.querySelector('.select-check');
    if (check) {
      check.classList.remove('checked');
      check.textContent = '';
    }
    item.classList.remove('selected');
  });

function createBulkToolbar() {
  let toolbar = document.querySelector('.bulk-toolbar');
  if (!toolbar) {
    toolbar = document.createElement('div');
    toolbar.className = 'bulk-toolbar';
    document.body.appendChild(toolbar);
  }
  toolbar.innerHTML = `

function togglePhotoSelect(photoId) {
  if (photoState.selectedIds.has(photoId)) {
    photoState.selectedIds.delete(photoId);
  } else {
    photoState.selectedIds.add(photoId);
  }

  // Update UI
  const item = document.querySelector(`.masonry-item[data-id="${photoId}"]`);
  if (item) {
    const check = item.querySelector('.select-check');
    const isSelected = photoState.selectedIds.has(photoId);
    item.classList.toggle('selected', isSelected);
    if (check) {
      check.classList.toggle('checked', isSelected);
      check.textContent = isSelected ? '✓' : '';
    }
  }

  const countEl = document.getElementById('bulkCount');
  if (countEl) countEl.textContent = photoState.selectedIds.size;
}

      <div class="progress-text" id="uploadProgressText">0%</div>
      <div class="upload-file-list" id="uploadFileList"></div>
    </div>
  `, `<button class="btn btn-ghost" onclick="closeModal()">Đóng</button><button class="btn btn-primary" id="uploadSubmitBtn" onclick="startUpload()">📤 Tải lên</button>`);

function handleDrop(event) {
  event.preventDefault();
  event.target.closest('.upload-dropzone')?.classList.remove('dragover');
  const files = event.dataTransfer.files;
  if (files.length) onFilesSelected(files);
}

function onFilesSelected(files) {
  if (!files.length) return;
  photoState.uploadFiles = [...files];

  const preview = document.getElementById('uploadPreviewArea');
  if (!preview) return;

  preview.innerHTML = `
    <div class="upload-file-list">
      ${[...files].map((f, i) => `
        <div class="upload-file-item" id="upload-file-${i}">
          <span class="file-name">${esc(f.name)}</span>
          <span style="font-size:.72rem;color:var(--text2)">${formatFileSize(f.size)}</span>
          <span class="file-status" id="upload-status-${i}">⏳</span>
        </div>
      `).join('')}
    </div>
  `;
}

async function startUpload() {
  const files = photoState.uploadFiles;
  if (!files || !files.length) {
    // Try to get from input
    const input = document.getElementById('uploadFileInput');
    if (input?.files?.length) {
      photoState.uploadFiles = [...input.files];
    } else {
      return toast('⚠️ Chọn ảnh/video nhé!');
    }
  }

  const caption = document.getElementById('f-upload-caption')?.value?.trim() || '';
  const date = document.getElementById('f-upload-date')?.value || new Date().toISOString().slice(0, 10);
  const albumId = document.getElementById('f-upload-album')?.value || '';

  const progressArea = document.getElementById('uploadProgressArea');
  const progressBar = document.getElementById('uploadProgressBar');
  const progressText = document.getElementById('uploadProgressText');
  const submitBtn = document.getElementById('uploadSubmitBtn');

  if (progressArea) progressArea.style.display = 'block';
  if (submitBtn) submitBtn.disabled = true;

  const totalFiles = photoState.uploadFiles.length;
  let completed = 0;

  for (let i = 0; i < totalFiles; i++) {
    const file = photoState.uploadFiles[i];
    const statusEl = document.getElementById(`upload-status-${i}`);

    if (statusEl) { statusEl.textContent = '⬆️'; statusEl.className = 'file-status uploading'; }

    try {
      const fd = new FormData();
      fd.append('photo', file);
      fd.append('caption', caption);
      fd.append('date', date);
      if (albumId) fd.append('album_id', albumId);

      const result = await apiUpload(`/kids/${state.selectedKid}/photos`, fd);

      if (result?.ok) {
        if (statusEl) { statusEl.textContent = '✅'; statusEl.className = 'file-status done'; }
      } else {
        if (statusEl) { statusEl.textContent = '❌'; statusEl.className = 'file-status error'; }
      }
    } catch (e) {
      if (statusEl) { statusEl.textContent = '❌'; statusEl.className = 'file-status error'; }
    }

    completed++;
    const pct = Math.round((completed / totalFiles) * 100);
    if (progressBar) progressBar.style.width = pct + '%';
    if (progressText) progressText.textContent = `${completed}/${totalFiles} · ${pct}%`;
  }

  toast(`📷 Đã tải lên ${completed} file!`);
  if (submitBtn) submitBtn.disabled = false;

  // Auto close after 1s
  setTimeout(() => { closeModal(); renderPhotos(); }, 1000);
}

// ---- Lightbox ----
function openLightbox(photoId) {
  const photos = photoState.lightboxPhotos;
  const index = photos.findIndex(p => p.id === photoId);
  if (index === -1) return;

  photoState.currentLightboxIndex = index;

  // Create lightbox if not exists
  let lb = document.getElementById('lightbox');
  if (!lb) {
    lb = document.createElement('div');
    lb.id = 'lightbox';
    lb.className = 'lightbox';
    document.body.appendChild(lb);
  }

  renderLightbox();
  lb.classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  const lb = document.getElementById('lightbox');
  if (lb) {
    lb.classList.remove('show');
    const video = lb.querySelector('video');
    if (video) video.pause();
  }
  document.body.style.overflow = '';
  photoState.currentLightboxIndex = -1;
}

function renderLightbox() {
  const lb = document.getElementById('lightbox');
  const photos = photoState.lightboxPhotos;
  const index = photoState.currentLightboxIndex;
  const photo = photos[index];
  if (!photo || !lb) return;

  const isVideo = photo.file_type === 'video';
  const src = `/uploads/${photo.filename}`;

  lb.innerHTML = `
    <div class="lightbox-header">
      <div class="lb-info">
        <span class="lightbox-counter">${index + 1} / ${photos.length}</span>
      </div>
      <div class="lb-actions">
        <button class="lb-btn" onclick="sharePhoto(${photo.id})" title="Chia sẻ">🔗</button>
        <button class="lb-btn" onclick="showPhotoInfo(${photo.id})" title="Thông tin">ℹ️</button>
        <button class="lb-btn" onclick="deletePhotoFromLightbox(${photo.id})" title="Xóa">🗑️</button>
        <button class="lb-btn" onclick="closeLightbox()" title="Đóng">✕</button>
      </div>
    </div>
    <div class="lightbox-body" id="lightboxBody">
      ${isVideo ? `
        <video class="lb-video" src="${src}" controls autoplay playsinline></video>
      ` : `
        <img class="lb-media" src="${src}" alt="${esc(photo.caption||'')}" id="lightboxImg"
             draggable="false">
      `}
      <button class="lightbox-nav prev" onclick="lightboxNav(-1)">‹</button>
      <button class="lightbox-nav next" onclick="lightboxNav(1)">›</button>
    </div>
    <div class="lightbox-footer">
      ${photo.caption ? `<div class="lb-caption">${esc(photo.caption)}</div>` : ''}
      <div class="lb-date">${photo.exif_date || photo.date || ''} ${photo.camera_model ? '· '+esc(photo.camera_model) : ''} ${photo.file_size ? '· '+formatFileSize(photo.file_size) : ''}</div>
    </div>
    <div class="lightbox-thumbs">
      ${photos.slice(Math.max(0, index - 10), Math.min(photos.length, index + 11)).map((p, i) => {
        const realIndex = Math.max(0, index - 10) + i;
        const thumbSrc = p.thumbnail_path ? `/uploads/${p.thumbnail_path}` : `/uploads/${p.filename}`;
        return `<div class="thumb-item ${realIndex === index ? 'active' : ''}" onclick="goToLightboxIndex(${realIndex})">
          <img src="${thumbSrc}" alt="">
        </div>`;
      }).join('')}
    </div>
  `;

  // Add touch/swipe support
  setupLightboxGestures();
}

function lightboxNav(dir) {
  const photos = photoState.lightboxPhotos;
  let newIndex = photoState.currentLightboxIndex + dir;
  if (newIndex < 0) newIndex = photos.length - 1;
  if (newIndex >= photos.length) newIndex = 0;
  photoState.currentLightboxIndex = newIndex;
  renderLightbox();
}

function goToLightboxIndex(index) {
  photoState.currentLightboxIndex = index;
  renderLightbox();
}

function setupLightboxGestures() {
  const body = document.getElementById('lightboxBody');
  if (!body || body.dataset.gesturesSetup) return;
  body.dataset.gesturesSetup = 'true';

  let startX = 0, startY = 0, isDragging = false;
  let pinchStartDist = 0, currentScale = 1;

  // Touch swipe
  body.addEventListener('touchstart', (e) => {
    const media = document.getElementById('lightboxImg') || document.querySelector('.lb-video');
    if (e.touches.length === 2 && media) {
      // Pinch start
      pinchStartDist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
    } else if (e.touches.length === 1) {
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      isDragging = true;
    }
  }, { passive: true });

  body.addEventListener('touchmove', (e) => {
    const media = document.getElementById('lightboxImg') || document.querySelector('.lb-video');
    if (e.touches.length === 2 && media && pinchStartDist) {
      // Pinch zoom
      const dist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      currentScale = Math.max(0.5, Math.min(5, dist / pinchStartDist));
      media.style.transform = `scale(${currentScale})`;
    } else if (e.touches.length === 1 && isDragging) {
      const dy = e.touches[0].clientY - startY;
      const dx = e.touches[0].clientX - startX;
      // Dragging vertically (pull to dismiss effect)
      if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 10) {
        if (media) media.style.transform = `translateY(${dy}px) scale(${Math.max(0.8, 1 - Math.abs(dy)/1000)})`;
        const opacity = Math.max(0.3, 0.95 - Math.abs(dy)/400);
        document.getElementById('lightbox').style.backgroundColor = `rgba(0,0,0,${opacity})`;
      }
    }
  }, { passive: true });

  body.addEventListener('touchend', (e) => {
    const media = document.getElementById('lightboxImg') || document.querySelector('.lb-video');
    if (pinchStartDist && currentScale !== 1) {
      // Reset pinch
      if (currentScale < 1.1 && currentScale > 0.9) {
        if (media) media.style.transform = '';
        currentScale = 1;
      }
      pinchStartDist = 0;
      return;
    }

    if (!isDragging) return;
    isDragging = false;

    const dx = (e.changedTouches[0]?.clientX || 0) - startX;
    const dy = (e.changedTouches[0]?.clientY || 0) - startY;

    if (Math.abs(dy) > 100 && Math.abs(dy) > Math.abs(dx)) {
      closeLightbox();
    } else if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) {
      if (dx > 0) lightboxNav(-1);
      else lightboxNav(1);
    }
    
    // Reset styles
    if (media) {
      media.style.transform = '';
      media.style.transition = 'transform 0.3s ease';
      setTimeout(() => { if (media) media.style.transition = ''; }, 300);
    }
    const lb = document.getElementById('lightbox');
    if (lb) lb.style.backgroundColor = '';
  }, { passive: true });

  // Keyboard nav
  document.addEventListener('keydown', lightboxKeyHandler);
}

function lightboxKeyHandler(e) {
  const lb = document.getElementById('lightbox');
  if (!lb || !lb.classList.contains('show')) {
    document.removeEventListener('keydown', lightboxKeyHandler);
    return;
  }
  if (e.key === 'ArrowLeft') lightboxNav(-1);
  else if (e.key === 'ArrowRight') lightboxNav(1);
  else if (e.key === 'Escape') closeLightbox();
}

async function deletePhotoFromLightbox(photoId) {
  if (!confirm('Xóa ảnh này?')) return;
  await api(`/kids/${state.selectedKid}/photos/${photoId}`, { method: 'DELETE' });
  toast('🗑️ Đã xóa');

  // Remove from list and update
  photoState.lightboxPhotos = photoState.lightboxPhotos.filter(p => p.id !== photoId);
  if (photoState.lightboxPhotos.length === 0) {

    photoState.currentLightboxIndex = photoState.lightboxPhotos.length - 1;
  }
  renderLightbox();
}

}

// ---- Utility ----
function formatFileSize(bytes) {
  if (!bytes) return '0 B';
  const k = 1024;
  const sizes = ['B', 'KB', 'MB', 'GB'];
  const i = Math.floor(Math.log(bytes) / Math.log(k));
  return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
}

function formatDuration(seconds) {
  if (!seconds) return '';
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function formatDateLabel(dateStr) {
  if (!dateStr || dateStr === 'unknown') return 'Không rõ ngày';
  const d = new Date(dateStr + 'T00:00:00');
  const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
  return d.toLocaleDateString('vi-VN', options);
}

function relativeDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  const now = new Date();
  const diff = Math.floor((now - d) / (1000 * 60 * 60 * 24));
  if (diff === 0) return 'Hôm nay';
  if (diff === 1) return 'Hôm qua';
  if (diff < 7) return `${diff} ngày trước`;
  if (diff < 30) return `${Math.floor(diff/7)} tuần trước`;
  if (diff < 365) return `${Math.floor(diff/30)} tháng trước`;
  return `${Math.floor(diff/365)} năm trước`;
}

    if (el) el.style.display = t === tab ? '' : 'none';

  });
}

function filterActivities(cat) {
  document.querySelectorAll('.montessori-act').forEach(el => {
    el.style.display = (cat === 'all' || el.dataset.cat === cat) ? 'flex' : 'none';
  });
  document.querySelectorAll('.montessori-filter').forEach(btn => {
    const isAll = cat === 'all' && btn.textContent.includes('Tất cả');
    const isMatch = btn.textContent.toLowerCase().includes(cat.replace('_',' '));
    btn.className = 'btn btn-sm ' + (isAll || isMatch ? 'btn-primary' : 'btn-ghost') + ' montessori-filter';
  });
}

function calcAge(b) {
  const bd=new Date(b), now=new Date();
  let y=now.getFullYear()-bd.getFullYear(), m=now.getMonth()-bd.getMonth();

}

async function checkAuth() {
  const token = localStorage.getItem('kj_token');
  const user = localStorage.getItem('kj_user');
  if (token && user) {
    state.token = token;
    state.user = JSON.parse(user);
    // Try to refresh token
    try {
      const r = await fetch('/api/auth/refresh', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ token })
      });
      if (r.ok) {
        const data = await r.json();
        saveAuth(data.token, data.user);
        return true;
      }
    } catch(e) {}
    // Token might still be valid
    return true;
  }
  return false;
}

let pinValue = '';
function pinDigit(d) {
  if (pinValue.length >= 6) return;
  pinValue += d;
  updatePinDots();
  if (pinValue.length >= 4) {
    // Auto-submit after 4-6 digits (small delay)
    setTimeout(() => { if (pinValue.length >= 4 && pinValue.length <= 6) doLogin(); }, 300);
  }
}
function pinBackspace() {
  pinValue = pinValue.slice(0, -1);
  updatePinDots();
  document.getElementById('login-error').style.display = 'none';
}
function updatePinDots() {
  const dots = document.querySelectorAll('.pin-dot');
  dots.forEach((d, i) => d.classList.toggle('filled', i < pinValue.length));
}

async function doLogin() {
  const username = document.getElementById('login-username').value.trim();
  const pin = pinValue;
  const errEl = document.getElementById('login-error');

  if (!username) { errEl.textContent = 'Nhập tên đăng nhập'; errEl.style.display = 'block'; return; }
  if (pin.length < 4) { errEl.textContent = 'Nhập đủ PIN'; errEl.style.display = 'block'; return; }

  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ username, pin })
    });
    const data = await r.json();
    if (!r.ok) {
      errEl.textContent = data.error || 'Sai PIN';
      errEl.style.display = 'block';
      pinValue = '';
      updatePinDots();
      return;
    }
    saveAuth(data.token, data.user);
    toast(`👋 Xin chào ${data.user.display_name}!`);
    showApp();
  } catch(e) {
    errEl.textContent = 'Lỗi kết nối server';
    errEl.style.display = 'block';
    pinValue = '';
    updatePinDots();
  }
}

// WHO Growth Chart (Canvas-based)
function drawWHOChart(canvasId, data, whoCurves, field, unit, kidBirthday, kidGender) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  const W = rect.width, H = rect.height;
  const pad = { top: 20, right: 20, bottom: 40, left: 50 };
  const plotW = W - pad.left - pad.right;
  const plotH = H - pad.top - pad.bottom;

  // Filter records with valid data
  const records = data.records.filter(r => r[field] && r.ageMonths !== null);
  if (!records.length && !whoCurves) return;

  // Calculate age range
  const allAges = records.map(r => r.ageMonths);
  const curveAges = whoCurves && whoCurves['0'] ? whoCurves['0'].map(p => p.age) : [];
  const ages = [...allAges, ...curveAges];
  if (!ages.length) return;

  const minAge = Math.max(0, Math.min(...ages) - 2);
  const maxAge = Math.max(...ages) + 2;

  // Calculate value range
  const allValues = records.map(r => r[field]);
  const curveValues = [];
  if (whoCurves) {
    for (const sd of ['-3','3']) {
      if (whoCurves[sd]) whoCurves[sd].forEach(p => curveValues.push(p.value));
    }
  }
  const allV = [...allValues, ...curveValues];
  const minVal = Math.min(...allV) * 0.9;
  const maxVal = Math.max(...allV) * 1.05;

  // Scale functions
  const xScale = (age) => pad.left + ((age - minAge) / (maxAge - minAge)) * plotW;
  const yScale = (val) => pad.top + plotH - ((val - minVal) / (maxVal - minVal)) * plotH;

  // Clear
  ctx.clearRect(0, 0, W, H);

  // Grid lines
  ctx.strokeStyle = '#f0ece6';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= 5; i++) {
    const y = pad.top + (plotH / 5) * i;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W - pad.right, y); ctx.stroke();
  }

  // WHO curves
  if (whoCurves) {
    const sdColors = {
      '-3': '#e74c3c', '-2': '#e67e22', '-1': '#f39c12',
      '0': '#27ae60', '1': '#f39c12', '2': '#e67e22', '3': '#e74c3c'
    };
    const sdLabels = { '-3': '-3SD', '-2': '-2SD', '-1': '-1SD', '0': 'Median', '1': '+1SD', '2': '+2SD', '3': '+3SD' };

    for (const sd of ['-3','-2','-1','0','1','2','3']) {
      const points = whoCurves[sd];
      if (!points || !points.length) continue;
      ctx.beginPath();
      ctx.strokeStyle = sdColors[sd];
      ctx.lineWidth = sd === '0' ? 2.5 : 1.2;
      ctx.globalAlpha = sd === '0' ? 1 : 0.5;
      if (sd !== '0') ctx.setLineDash([4, 4]);

      points.forEach((p, i) => {
        const x = xScale(p.age);
        const y = yScale(p.value);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.globalAlpha = 1;

      // Label at end
      const last = points[points.length - 1];
      if (last) {
        ctx.fillStyle = sdColors[sd];
        ctx.font = '10px system-ui';
        ctx.globalAlpha = 0.7;
        ctx.fillText(sdLabels[sd], xScale(last.age) + 4, yScale(last.value) + 3);
        ctx.globalAlpha = 1;
      }
    }
  }

  // Data points
  ctx.fillStyle = '#6c5ce7';
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  records.forEach(r => {
    const x = xScale(r.ageMonths);
    const y = yScale(r[field]);
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
  });

  // Connect data points with line
  if (records.length > 1) {
    ctx.beginPath();
    ctx.strokeStyle = '#6c5ce7';
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.6;
    records.forEach((r, i) => {
      const x = xScale(r.ageMonths);
      const y = yScale(r[field]);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // Axes labels
  ctx.fillStyle = '#636e72';
  ctx.font = '10px system-ui';
  ctx.textAlign = 'center';
  // X axis: age months
  for (let age = Math.ceil(minAge); age <= maxAge; age += Math.max(1, Math.floor((maxAge - minAge) / 8))) {
    const x = xScale(age);
    ctx.fillText(age + 'th', x, H - pad.bottom + 16);
  }
  // Y axis: values
  ctx.textAlign = 'right';
  for (let i = 0; i <= 5; i++) {
    const val = minVal + ((maxVal - minVal) / 5) * (5 - i);
    const y = pad.top + (plotH / 5) * i;
    ctx.fillText(val.toFixed(1), pad.left - 8, y + 3);
  }

  // Unit label
  ctx.fillStyle = '#636e72';
  ctx.font = '11px system-ui';
  ctx.textAlign = 'left';
  ctx.fillText(unit, pad.left, pad.top - 6);
}

// Montessori Progress Helper
async function updateMontessoriProgress(activityKey, status, notes) {
  const fd = new FormData();
  fd.append('activity_key', activityKey);
  fd.append('status', status);
  if (notes) fd.append('notes', notes);
  // Check for evidence photo input
  const photoInput = document.getElementById('evidence-photo');
  if (photoInput && photoInput.files[0]) {
    fd.append('evidence', photoInput.files[0]);
  }
  await apiUpload(`/kids/${state.selectedKid}/montessori/progress`, fd);
  toast(status === 'completed' ? '✅ Đã hoàn thành!' : status === 'in_progress' ? '🔄 Đang thực hiện!' : '📋 Đã cập nhật');
  renderMontessoriProgress();
}

function filterProgress(status) {
  document.querySelectorAll('.progress-act').forEach(el => {
    el.style.display = (status === 'all' || el.dataset.status === status) ? 'flex' : 'none';
  });
  document.querySelectorAll('.progress-filter').forEach(btn => {
    const isAll = status === 'all' && btn.textContent.includes('Tất cả');
    const isMatch = btn.textContent.toLowerCase().includes(status.replace('_',' '));
    btn.className = 'btn btn-sm ' + (isAll || isMatch ? 'btn-primary' : 'btn-ghost') + ' progress-filter';
  });
}

function showProgressForm(key, title, currentStatus) {
  const nextStatus = currentStatus === 'not_started' ? 'in_progress' : 'completed';
  openModal(`Cập nhật: ${title}`, `
    <div class="form-group">
      <label>Trạng thái</label>
      <select id="prog-status">
        <option value="not_started" ${nextStatus==='not_started'?'selected':''}>📋 Chưa bắt đầu</option>
        <option value="in_progress" ${nextStatus==='in_progress'?'selected':''}>🔄 Đang thực hiện</option>
        <option value="completed" ${nextStatus==='completed'?'selected':''}>✅ Hoàn thành</option>
      </select>
    </div>
    <div class="form-group"><label>Ghi chú</label><textarea id="prog-notes" rows="3" placeholder="Ghi chú về hoạt động..."></textarea></div>
    <div class="form-group"><label>Ảnh minh chứng</label><input type="file" id="evidence-photo" accept="image/*"></div>
  `, `<button class="btn btn-ghost" onclick="closeModal()">Hủy</button><button class="btn btn-primary" onclick="submitProgress('${key}')">💾 Lưu</button>`);
}

async function submitProgress(key) {
  const status = document.getElementById('prog-status').value;
  const notes = document.getElementById('prog-notes').value.trim();
  await updateMontessoriProgress(key, status, notes);
  closeModal();
}

        <span style="font-size:1.1rem">${p.icon || '📌'}</span>
        <div style="flex:1">
          <div style="font-weight:600;font-size:.85rem">${p.title || p.activity_key}</div>
          <div style="font-size:.72rem;color:var(--text2)">${p.category || ''} ${p.duration ? '· '+p.duration : ''}</div>
        </div>
        <span style="font-size:.7rem;padding:2px 8px;border-radius:6px;background:${p.status==='done'?'var(--secondary)':'var(--border)'}22;color:${p.status==='done'?'var(--secondary)':'var(--text2)'}">${p.status==='done'?'✅':'📋'}</span>
      </div>
    `).join('')}
  `;
}

// ============ GROWTH REPORT ============
function openGrowthReport() {
  if (!state.selectedKid) return;
  window.open(`/api/kids/${state.selectedKid}/report/growth`, '_blank');
}

// ============ SETTINGS (Backup & Restore) ============
function renderSettings() {
  const c = document.getElementById('content');
  c.innerHTML = `
    <div class="grid-2">
      <div class="card"><div class="card-body" style="text-align:center;padding:32px">
        <div style="font-size:2.5rem;margin-bottom:12px">📤</div>
        <h4 style="margin-bottom:8px">Sao lưu dữ liệu</h4>
        <p style="color:var(--text2);font-size:.85rem;margin-bottom:20px;line-height:1.6">Xuất toàn bộ dữ liệu (bé, nhật ký, kế hoạch, cột mốc, tăng trưởng, Montessori) thành file JSON. Không bao gồm PIN đã mã hóa.</p>
        <button class="btn btn-primary" onclick="exportBackup()" style="padding:12px 28px">📥 Tải file sao lưu</button>
      </div></div>
      <div class="card"><div class="card-body" style="text-align:center;padding:32px">
        <div style="font-size:2.5rem;margin-bottom:12px">📥</div>
        <h4 style="margin-bottom:8px">Khôi phục dữ liệu</h4>
        <p style="color:var(--text2);font-size:.85rem;margin-bottom:20px;line-height:1.6">Nhập file sao lưu JSON để khôi phục dữ liệu. Dữ liệu trùng sẽ được ghi đè.</p>
        <input type="file" id="import-file" accept=".json" style="display:none" onchange="importBackup(this)">
        <button class="btn btn-secondary" onclick="document.getElementById('import-file').click()" style="padding:12px 28px">📤 Chọn file khôi phục</button>
      </div></div>
    </div>

    <div class="card" style="margin-top:20px"><div class="card-body">
      <h4 style="margin-bottom:14px">ℹ️ Thông tin ứng dụng</h4>
      <div class="info-grid">
        <div class="info-item"><div class="label">Phiên bản</div><div class="value">2.0.0</div></div>
        <div class="info-item"><div class="label">Cơ sở dữ liệu</div><div class="value">SQLite (WAL)</div></div>
        <div class="info-item"><div class="label">Dữ liệu WHO</div><div class="value">LMS Reference</div></div>
        <div class="info-item"><div class="label">PWA</div><div class="value">Service Worker active</div></div>
      </div>
    </div></div>
  `;
}

async function exportBackup() {
  showLoading('Đang xuất dữ liệu...');
  try {
    const headers = {};
    if (state.token) headers['Authorization'] = 'Bearer ' + state.token;
    const r = await fetch('/api/backup/export', { headers });
    if (!r.ok) throw new Error('Export failed');
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `kid-journey-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    toast('✅ Đã tải file sao lưu!');
  } catch(e) {
    toast('❌ Lỗi khi xuất dữ liệu');
  }
  hideLoading();
}

async function importBackup(input) {
  if (!input.files[0]) return;
  if (!confirm('Khôi phục dữ liệu? Dữ liệu trùng sẽ được ghi đè.')) { input.value = ''; return; }
  showLoading('Đang khôi phục dữ liệu...');
  try {
    const text = await input.files[0].text();
    const data = JSON.parse(text);
    const r = await api('/backup/import', { method:'POST', body:data });
    if (r && r.ok) {
      const total = Object.values(r.imported).reduce((a,b) => a+b, 0);
      toast(`✅ Đã khôi phục ${total} bản ghi!`);
      await loadKids();
      render();
    } else {
      toast('❌ ' + (r?.error || 'Lỗi khôi phục'));
    }
  } catch(e) {
    toast('❌ File không hợp lệ');
  }
  hideLoading();
  input.value = '';
}

// Init — check auth first
(async () => {
  const authenticated = await checkAuth();
  if (authenticated) {
    showApp();
  } else {
    renderLogin();
  }
})();
</script>
